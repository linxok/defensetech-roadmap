version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: drone
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: drone
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://drone:secret@postgres:5432/drone
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - postgres
      - rabbitmq

  worker:
    build: ./backend
    command: python worker.py
    environment:
      DATABASE_URL: postgresql://drone:secret@postgres:5432/drone
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      - postgres
      - rabbitmq

  gateway:
    build: ./gateway
    ports:
      - "14550:14550/udp"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws
    depends_on:
      - backend

volumes:
  pgdata:
