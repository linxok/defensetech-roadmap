apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: drone-telemetry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: defensetech/backend:latest
          command: ["python", "worker.py"]
          env:
            - name: DATABASE_URL
              value: "postgresql://drone:secret@postgres:5432/drone"
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq:5672/"
