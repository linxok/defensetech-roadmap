apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: drone-telemetry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: defensetech/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql://drone:secret@postgres:5432/drone"
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq:5672/"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: drone-telemetry
spec:
  selector:
    app: backend
  ports:
    - port: 8000
